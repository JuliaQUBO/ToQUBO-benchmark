name: toqubo-plot

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["toqubo-benchmark"]
    types:
      - completed
  push:
    branches: [main]
  
permissions:
  contents: write


jobs:
  plot:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && contains(github.event.head_commit.message, '[plot]')) ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          (
            github.event.workflow_run.event == 'workflow_dispatch' ||
            contains(github.event.workflow_run.head_commit.message, '[run]')
          )
        )
      }}
    name: Python ${{ matrix.python-version }} @ ${{ matrix.os }}/${{ matrix.arch }}/${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.12'
            os: ubuntu-latest
            arch: x64
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Make Plots
      run: |
        make install-plot
        make plot
    - name: Save Plots
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # For authentication with GitHub Actions token
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "suporte@psr-inc.com"
        git add ./data/*.pdf ./data/*.png
        if git diff --cached --quiet; then
          echo "No plot changes to commit."
        else
          git commit -m "Save Benchmark Plots [actions]"
          git push
        fi
        
