name: toqubo-benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  benchmark:
    if: ${{ !(github.event_name == 'push') || contains(github.event.head_commit.message, '[run]') }}
    name: Julia ${{ matrix.julia-version }}, Python ${{ matrix.python-version }} @ ${{ matrix.os }}/${{ matrix.arch }}/${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - julia-version: '1.12.6'
            python-version: '3.12'
            os: ubuntu-22.04
            arch: x64
    steps:
    - uses: actions/checkout@v6
    - uses: julia-actions/setup-julia@v3
      with:
        version: ${{ matrix.julia-version }}
        arch: ${{ matrix.arch }}
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install & Run Benchmarks
      env:
        BENCHMARK_RESULT_SET_ID: released-qubo-stack-2026-06-23
        BENCHMARK_RESULT_STATUS: released-qubo-stack-rerun
        BENCHMARK_TOQUBO_DEPENDENCY_STATUS: registered-release
        BENCHMARK_TOQUBO_SOURCE: ToQUBO v0.5.0
        BENCHMARK_QUBOTOOLS_SOURCE: QUBOTools v0.14.4
        BENCHMARK_TOQUBO_DEPENDENCY_NOTE: Resolved from the General registry with Julia 1.12.6 after QUBO.jl ecosystem releases; QUBO.jl v0.6.1 is released but this benchmark depends on ToQUBO/QUBOTools directly.
      run: |
        make install
        make run
    - name: Save Results
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # For authentication with GitHub Actions token
      run: |
        git config --global user.name  "PSR Actions"
        git config --global user.email "suporte@psr-inc.com"
        git add ./benchmark/**/results.*.csv
        git add ./data/report.json
        if git diff --cached --quiet; then
          echo "No benchmark result changes to commit."
        else
          git commit -m "Save Benchmark Results [actions]"
          git push
        fi
